<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Relatórios de Commits{% endblock %}</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', path='css/style.css') }}"
    />
    {% block extra_css %}{% endblock %}
  </head>
  <body>
    <nav class="navbar">
      <div style="display: flex; align-items: center; gap: 2rem">
        <a href="/" class="logo"> <span>🚀</span> Relatórios DGB </a>
        <div style="font-size: 0.8rem; color: var(--text-muted)">
          Host: <strong>LDD-NOTE-005</strong>
        </div>
      </div>

      <button class="theme-toggle" id="theme-toggle" title="Alternar tema">
        <span id="theme-icon">🌙</span>
      </button>
    </nav>

    <div class="container">{% block content %}{% endblock %}</div>

    <script>
      const toggle = document.getElementById("theme-toggle");
      const icon = document.getElementById("theme-icon");
      const html = document.documentElement;

      // Carregar preferência
      const savedTheme = localStorage.getItem("theme") || "light";
      html.setAttribute("data-theme", savedTheme);
      updateIcon(savedTheme);

      toggle.addEventListener("click", () => {
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";

        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
        updateIcon(newTheme);
      });

      function updateIcon(theme) {
        icon.innerText = theme === "light" ? "🌙" : "☀️";
      }
    </script>
  </body>
</html>
