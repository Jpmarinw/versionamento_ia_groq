{% extends "base.html" %}

{% block title %}Relatório - {{ filename }}{% endblock %}

{% block content %}
<div class="breadcrumb">
  <a href="/">Dashboard</a> /
  <a href="/repo/{{ repo_name }}">{{ repo_name }}</a> / <span>Relatório</span>
</div>

<article class="report-content">{{ content | safe }}</article>

<div style="margin-top: 2rem; text-align: center">
  <a
    href="/repo/{{ repo_name }}"
    style="color: var(--text-muted); text-decoration: none; font-size: 0.875rem"
    >← Voltar para a lista</a
  >
</div>
{% endblock %}
